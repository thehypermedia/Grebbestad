<!DOCTYPE html>
<html lang="yue">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0">
  <title>SAAGI · 下長街39號 · 誠實雙結構藍圖（修正現金流）</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'Inter', 'Noto Sans HK', system-ui, -apple-system, sans-serif;
      background: #0b0f1a; color: #e6eaf0; overflow: hidden; height: 100vh; width: 100vw; position: relative;
    }
    .presentation { width: 100%; height: 100%; position: relative; }
    .slide {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      padding: 3rem 4rem 6rem 4rem; display: block; opacity: 0;
      transition: opacity 0.6s cubic-bezier(0.23, 1, 0.32, 1); pointer-events: none;
      background: radial-gradient(circle at 10% 20%, #1a2540, #0b0f1a);
      overflow-y: auto; scrollbar-width: thin; scrollbar-color: #d4af37 #0b0f1a;
      -webkit-overflow-scrolling: touch;
    }
    .slide.active { opacity: 1; pointer-events: auto; z-index: 10; }
    .slide::-webkit-scrollbar { width: 6px; }
    .slide::-webkit-scrollbar-track { background: #0b0f1a; }
    .slide::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 3px; }
    .title-slide {
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      text-align: center; padding: 3rem 2rem 6rem 2rem;
    }
    h1 {
      font-size: 4.5rem; font-weight: 700; letter-spacing: -0.02em;
      background: linear-gradient(135deg, #f9e076, #d4af37);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 1.5rem; line-height: 1.1;
    }
    h2 {
      font-size: 2.8rem; font-weight: 600; color: #f5e7b3; margin-bottom: 2rem;
      border-left: 0.5rem solid #d4af37; padding-left: 1.5rem;
    }
    h3 { font-size: 1.8rem; font-weight: 500; color: #d4af37; margin: 1.5rem 0 1rem; }
    p, li { font-size: 1.2rem; line-height: 1.6; color: #ccd6e0; margin-bottom: 1rem; }
    .big-number { font-size: 3.5rem; font-weight: 700; color: #d4af37; display: block; line-height: 1.2; }
    .stat-label { font-size: 1rem; text-transform: uppercase; letter-spacing: 0.1em; color: #9aa4b8; }
    .grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; width: 100%; }
    .grid-3col { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
    .card {
      background: rgba(20, 30, 50, 0.7); backdrop-filter: blur(12px);
      border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 1.5rem; padding: 2rem;
      box-shadow: 0 25px 45px -10px rgba(0,0,0,0.5);
    }
    .gold-accent { color: #d4af37; font-weight: 600; }
    table {
      width: 100%; border-collapse: collapse; background: rgba(10, 18, 30, 0.7);
      border-radius: 1rem; overflow: hidden; margin: 1.5rem 0; font-size: 1rem;
    }
    th { background: #1e2b44; color: #f5e7b3; font-weight: 600; padding: 1rem; text-align: left; }
    td { padding: 0.8rem 1rem; border-bottom: 1px solid rgba(212, 175, 55, 0.15); }
    tr:last-child td { border-bottom: none; }
    .negative { color: #e0556a; }
    .positive { color: #4cdf80; }
    .bar-chart {
      display: flex; align-items: flex-end; justify-content: space-around; height: 220px; margin: 2rem 0; gap: 0.5rem;
    }
    .bar {
      width: 7%; background: linear-gradient(to top, #d4af37, #f9e076);
      border-radius: 8px 8px 0 0; position: relative; transition: height 0.5s ease; min-height: 4px;
    }
    .bar-label { position: absolute; bottom: -2rem; left: 50%; transform: translateX(-50%); font-size: 0.7rem; color: #9aa4b8; white-space: nowrap; }
    .bar-value { position: absolute; top: -1.5rem; left: 50%; transform: translateX(-50%); font-size: 0.7rem; color: #d4af37; font-weight: 600; }
    .nav-controls {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      display: flex; gap: 1rem; align-items: center; z-index: 100;
      background: rgba(10, 15, 25, 0.8); backdrop-filter: blur(10px);
      padding: 0.6rem 1.8rem; border-radius: 3rem; border: 1px solid rgba(212, 175, 55, 0.3);
    }
    .nav-btn {
      background: transparent; border: none; color: #d4af37; font-size: 1.8rem;
      cursor: pointer; width: 40px; height: 40px; display: flex; align-items: center;
      justify-content: center; border-radius: 50%; transition: all 0.2s;
    }
    .nav-btn:hover { background: rgba(212, 175, 55, 0.15); transform: scale(1.1); }
    .slide-indicator { color: #9aa4b8; font-size: 0.9rem; min-width: 80px; text-align: center; user-select: none; }
    .dot-nav { display: flex; gap: 0.5rem; margin: 0 1rem; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #3a4356; transition: background 0.3s; cursor: pointer; }
    .dot.active-dot { background: #d4af37; box-shadow: 0 0 12px #d4af37; }
    @media (max-width: 900px) {
      .slide { padding: 2rem 1.5rem 6rem 1.5rem; }
      h1 { font-size: 2.8rem; }
      h2 { font-size: 2rem; }
      .grid-2col, .grid-3col { grid-template-columns: 1fr; }
      .bar-chart { height: 150px; }
    }
    .gold-separator { width: 120px; height: 4px; background: #d4af37; margin: 2rem auto; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="presentation" id="presentation"></div>
  <div class="nav-controls">
    <button class="nav-btn" id="prevSlide" aria-label="上一個">←</button>
    <div class="dot-nav" id="dotNav"></div>
    <span class="slide-indicator" id="slideIndicator">1 / 16</span>
    <button class="nav-btn" id="nextSlide" aria-label="下一個">→</button>
  </div>
  <script>
    (function() {
      // --- 誠實現金流數字（已修正） ---
      const PURCHASE_PRICE = 8300000;
      const DOWN_PAYMENT = 830000;
      const LAGFART = 124500;
      const PANTBREV = 114550;
      const TOTAL_UPFRONT = DOWN_PAYMENT + LAGFART + PANTBREV;

      const LOAN = PURCHASE_PRICE * 0.9;
      const SWE_INTEREST = Math.round(LOAN * 0.0285);
      const AMORT = LOAN * 0.02;

      const GROSS_REVENUE = 2792325;
      const VAT = Math.round(GROSS_REVENUE - GROSS_REVENUE/1.12);
      const COMMISSION = Math.round(GROSS_REVENUE * 0.161);
      const CLEANING = 131250;
      const SUPPLIES = 30000;

      const DRIFT = 88226;
      const FASTIGHET = 10425;
      const FIBER = 6000;
      const HK_INTEREST_CASH = 350000;  // 真實現金流出

      const RENT_A = 550000;
      // 全部私人現金流出
      const PRIVATE_TOTAL_CASH_OUT = DRIFT + FASTIGHET + FIBER + SWE_INTEREST + HK_INTEREST_CASH + AMORT;
      // 88,226 + 10,425 + 6,000 + 212,895 + 350,000 + 149,400 = 816,946
      const PRIVATE_NET_BEFORE_REFUND = RENT_A - PRIVATE_TOTAL_CASH_OUT; // -266,946
      // 資本虧損: (扣除額總和) - 租金收入 = 667,546 - 550,000 = 117,546
      const CAPITAL_DEFICIT = (DRIFT+FASTIGHET+FIBER+SWE_INTEREST+HK_INTEREST_CASH) - RENT_A;
      const TAX_REFUND = Math.round(0.3 * Math.min(CAPITAL_DEFICIT, 100000) + 0.21 * Math.max(0, CAPITAL_DEFICIT - 100000)); // 33,685
      const PRIVATE_NET_AFTER_REFUND = PRIVATE_NET_BEFORE_REFUND + TAX_REFUND; // -233,261

      // 公司 (情景A)
      const AB_PROFIT_BEFORE_TAX = GROSS_REVENUE - VAT - COMMISSION - CLEANING - SUPPLIES - RENT_A;
      const AB_TAX = Math.round(AB_PROFIT_BEFORE_TAX * 0.206);
      const AB_NET_PROFIT = AB_PROFIT_BEFORE_TAX - AB_TAX;

      // 股息解決方案：覆蓋私人現金赤字
      const NEEDED_AFTER_TAX_DIVIDEND = Math.abs(PRIVATE_NET_AFTER_REFUND); // 233,261
      const DIVIDEND_BEFORE_TAX = Math.ceil(NEEDED_AFTER_TAX_DIVIDEND / 0.8); // 291,577
      const DIVIDEND_TAX = Math.round(DIVIDEND_BEFORE_TAX * 0.2);
      const DIVIDEND_NET = DIVIDEND_BEFORE_TAX - DIVIDEND_TAX;

      // 支付股息後AB保留利潤
      const AB_RETAINED_AFTER_DIVIDEND = AB_NET_PROFIT - DIVIDEND_BEFORE_TAX;

      // 總合併保留現金
      const COMBINED_RETAINED = AB_RETAINED_AFTER_DIVIDEND; // 766,295
      const CASH_ON_CASH = (COMBINED_RETAINED / TOTAL_UPFRONT) * 100; // 仍然穩健

      // 每月現金流表格 (包含香港利息作為流出)
      const monthlyRevenues = [34410,31080,34410,66600,329220,546120,770040,542520,318600,51615,33300,34410];
      const monthLabels = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

      function buildMonthlyCashFlowTable() {
        const rentMonthly = RENT_A / 12;
        const otherOpExMonthly = (CLEANING + SUPPLIES) / 12;
        const privFixedMonthly = (DRIFT + FASTIGHET + FIBER) / 12;
        const sweInterestMonthly = SWE_INTEREST / 12;
        const hkInterestMonthly = HK_INTEREST_CASH / 12;
        const amortMonthly = AMORT / 12;
        const totalPrivOutMonthly = privFixedMonthly + sweInterestMonthly + hkInterestMonthly + amortMonthly;
        let rows = '';
        let totalGross=0, totalVat=0, totalComm=0, totalOther=0, totalRent=0, totalAbCash=0, totalPrivIn=0, totalPrivOut=0, totalPrivNet=0, totalCombined=0;
        for (let i = 0; i < 12; i++) {
          const gross = monthlyRevenues[i];
          const vat = Math.round(gross - gross/1.12);
          const comm = Math.round(gross * 0.161);
          const other = otherOpExMonthly;
          const rent = rentMonthly;
          const abCash = gross - vat - comm - other - rent;
          const privIn = rent;
          const privOut = totalPrivOutMonthly; // 所有私人流出
          const privNet = privIn - privOut;
          const combined = abCash + privNet;
          totalGross += gross; totalVat += vat; totalComm += comm; totalOther += other; totalRent += rent; totalAbCash += abCash; totalPrivIn += privIn; totalPrivOut += privOut; totalPrivNet += privNet; totalCombined += combined;
          const abClass = abCash >= 0 ? 'positive' : 'negative';
          const privClass = privNet >= 0 ? 'positive' : 'negative';
          const combClass = combined >= 0 ? 'positive' : 'negative';
          rows += `<tr>
            <td>${monthLabels[i]}</td><td>${gross.toLocaleString()}</td><td>${vat.toLocaleString()}</td><td>${comm.toLocaleString()}</td><td>${Math.round(other).toLocaleString()}</td><td>${Math.round(rent).toLocaleString()}</td>
            <td class="${abClass}">${Math.round(abCash).toLocaleString()}</td><td>${Math.round(privIn).toLocaleString()}</td><td>${Math.round(privOut).toLocaleString()}</td><td class="${privClass}">${Math.round(privNet).toLocaleString()}</td><td class="${combClass}">${Math.round(combined).toLocaleString()}</td>
          </tr>`;
        }
        rows += `<tr style="font-weight:bold; background:rgba(212,175,55,0.15);">
          <td>全年</td><td>${Math.round(totalGross).toLocaleString()}</td><td>${Math.round(totalVat).toLocaleString()}</td><td>${Math.round(totalComm).toLocaleString()}</td><td>${Math.round(totalOther).toLocaleString()}</td><td>${Math.round(totalRent).toLocaleString()}</td>
          <td>${Math.round(totalAbCash).toLocaleString()}</td><td>${Math.round(totalPrivIn).toLocaleString()}</td><td>${Math.round(totalPrivOut).toLocaleString()}</td><td>${Math.round(totalPrivNet).toLocaleString()}</td><td>${Math.round(totalCombined).toLocaleString()}</td>
        </tr>`;
        return rows;
      }

      const slidesData = [
        { title: true, content: `
          <div class="title-slide">
            <div style="font-size:1.2rem; letter-spacing:0.5em; color:#d4af37; margin-bottom:2rem;">SAAGI 超級代理集群</div>
            <h1 style="font-size:5rem;">下長街39號</h1>
            <div class="subtitle" style="font-size:1.8rem; color:#b9c2d4; letter-spacing:0.3em; font-weight:300; margin-bottom:2rem;">格雷伯斯塔德 · 瑞典</div>
            <div class="gold-separator"></div>
            <p style="font-size:1.5rem; max-width:700px; margin:2rem auto; color:#cbd5e1;">誠實嘅現金流模型 — 香港利息計為真實現金流出，赤字透過股息解決。</p>
            <div style="margin-top:3rem; color:#8b96a8; font-size:1rem;">機密 · 投資備忘錄 · 2026年6月</div>
          </div>`
        },
        { content: `
          <h2>01 &nbsp; 執行摘要</h2>
          <div class="grid-2col">
            <div>
              <p><span class="gold-accent">下長街39號</span> — 買入價830萬克朗。之前嘅模型錯誤地將香港按揭利息只當作紙上扣除。<strong>實際上，每年有${HK_INTEREST_CASH.toLocaleString()}克朗現金流出。</strong></p>
              <p>租金55萬克朗下，私人口袋深深見紅。解決方案係透過稅務高效嘅3:12股息，令整體結構依然非常賺錢。</p>
              <div style="display:flex; gap:2rem; margin-top:2rem;">
                <div><span class="big-number">${Math.round(COMBINED_RETAINED).toLocaleString()}</span><span class="stat-label">克朗 合併保留</span></div>
                <div><span class="big-number">${CASH_ON_CASH.toFixed(0)}%</span><span class="stat-label">現金回報率</span></div>
              </div>
            </div>
            <div class="card">
              <h3 style="margin-top:0;">已修正事項</h3>
              <ul style="list-style-type:none; padding-left:0;">
                <li>✓ 香港利息現被視為真實現金流出</li>
                <li>✓ 退稅額修正為${TAX_REFUND.toLocaleString()}克朗</li>
                <li>✓ 私人赤字-${Math.abs(PRIVATE_NET_AFTER_REFUND).toLocaleString()}克朗由股息完全填補</li>
                <li>✓ 支付股息後AB依然盈利</li>
              </ul>
            </div>
          </div>`
        },
        { content: `
          <h2>02 &nbsp; 成交日一次性費用</h2>
          <table>
            <tr><th>項目</th><th>金額（克朗）</th></tr>
            <tr><td>首期（10%）</td><td>${DOWN_PAYMENT.toLocaleString()}</td></tr>
            <tr><td>業權契稅（Lagfart）</td><td>${LAGFART.toLocaleString()}</td></tr>
            <tr><td>抵押契據（Pantbrev）</td><td>${PANTBREV.toLocaleString()}</td></tr>
            <tr style="font-weight:bold;"><td>總現金需求</td><td class="gold-accent">${TOTAL_UPFRONT.toLocaleString()}</td></tr>
          </table>
          <p>所有設備（電視、Wi-Fi、平板電腦）已包含在購買價內。</p>`
        },
        { content: `
          <h2>03 &nbsp; 雙結構框架</h2>
          <div class="grid-2col">
            <div class="card">
              <h3 style="margin-top:0;">🏠 私人持有</h3>
              <p>持有物業；支付所有物業開支、瑞典按揭利息，以及<strong>香港按揭利息</strong>（${HK_INTEREST_CASH.toLocaleString()}克朗/年）。</p>
              <p>從AB公司收取租金${RENT_A.toLocaleString()}克朗/年。</p>
            </div>
            <div class="card">
              <h3 style="margin-top:0;">🏢 有限公司（AB）</h3>
              <p>透過Booking.com（16.1%佣金）經營酒店。</p>
              <p>稅後淨利潤：${AB_NET_PROFIT.toLocaleString()}克朗。</p>
            </div>
          </div>
          <p style="margin-top:2rem; text-align:center;"><em>香港利息係最大嘅私人現金流失——但同時創造咗巨大嘅稅盾。</em></p>`
        },
        { content: `
          <h2>04 &nbsp; 私人口袋現金流實況（租金55萬）</h2>
          <table>
            <tr><th>現金項目</th><th>克朗</th></tr>
            <tr><td>租金收入</td><td class="positive">+ ${RENT_A.toLocaleString()}</td></tr>
            <tr><td>– 物業成本及瑞典利息</td><td class="negative">– ${(DRIFT+FASTIGHET+FIBER+SWE_INTEREST).toLocaleString()}</td></tr>
            <tr><td>– 香港利息</td><td class="negative">– ${HK_INTEREST_CASH.toLocaleString()}</td></tr>
            <tr><td>– 還本</td><td class="negative">– ${AMORT.toLocaleString()}</td></tr>
            <tr style="font-weight:bold;"><td>= 退稅前淨額</td><td class="negative">${PRIVATE_NET_BEFORE_REFUND.toLocaleString()}</td></tr>
            <tr><td>+ 退稅（來自資本虧損）</td><td class="positive">+ ${TAX_REFUND.toLocaleString()}</td></tr>
            <tr style="font-weight:bold; background:rgba(212,175,55,0.1);"><td>= 退稅後私人現金</td><td class="negative">${PRIVATE_NET_AFTER_REFUND.toLocaleString()}</td></tr>
          </table>
          <p style="margin-top:1rem;"><em>呢個先係真相：就算有退稅，每年你仍然短缺<strong>${Math.abs(PRIVATE_NET_AFTER_REFUND).toLocaleString()}克朗</strong>。</em></p>`
        },
        { content: `
          <h2>05 &nbsp; 公司利潤（AB）—— 有充足能力支援</h2>
          <table>
            <tr><td>總營業額</td><td>${GROSS_REVENUE.toLocaleString()}</td></tr>
            <tr><td>– 營運開支（含租金${RENT_A.toLocaleString()}）</td><td class="negative">– ${(VAT+COMMISSION+CLEANING+SUPPLIES+RENT_A).toLocaleString()}</td></tr>
            <tr style="font-weight:bold;"><td>= 稅前利潤</td><td>${AB_PROFIT_BEFORE_TAX.toLocaleString()}</td></tr>
            <tr><td>– 企業稅（20.6%）</td><td class="negative">– ${AB_TAX.toLocaleString()}</td></tr>
            <tr style="font-weight:bold;"><td>= AB淨利潤</td><td class="positive">${AB_NET_PROFIT.toLocaleString()}</td></tr>
          </table>
          <p style="margin-top:1rem;">呢筆利潤可以部分以<strong>3:12股息</strong>（20%稅）派發，以填補私人缺口。</p>`
        },
        { content: `
          <h2>06 &nbsp; 解決方案 – 3:12股息出手</h2>
          <div class="grid-2col">
            <div>
              <h3>股息計算</h3>
              <table>
                <tr><td>需填補嘅私人赤字</td><td>${Math.abs(PRIVATE_NET_AFTER_REFUND).toLocaleString()} kr</td></tr>
                <tr><td>所需股息（稅前）</td><td>${DIVIDEND_BEFORE_TAX.toLocaleString()} kr</td></tr>
                <tr><td>– 股息稅（20%）</td><td class="negative">– ${DIVIDEND_TAX.toLocaleString()} kr</td></tr>
                <tr style="font-weight:bold;"><td>= 淨現金到手</td><td class="positive">${DIVIDEND_NET.toLocaleString()} kr</td></tr>
              </table>
              <p style="margin-top:0.5rem;"><em>咁樣可以徹底消除私人赤字。</em></p>
            </div>
            <div>
              <h3>股息後</h3>
              <table>
                <tr><td>AB淨利潤</td><td>${AB_NET_PROFIT.toLocaleString()} kr</td></tr>
                <tr><td>– 派發股息</td><td class="negative">– ${DIVIDEND_BEFORE_TAX.toLocaleString()} kr</td></tr>
                <tr style="font-weight:bold;"><td>= AB保留利潤</td><td class="positive">${AB_RETAINED_AFTER_DIVIDEND.toLocaleString()} kr</td></tr>
                <tr><td>私人現金流</td><td class="positive">~0 kr（平衡）</td></tr>
                <tr style="font-weight:bold;"><td>合併保留財富</td><td class="positive">${AB_RETAINED_AFTER_DIVIDEND.toLocaleString()} kr</td></tr>
              </table>
            </div>
          </div>
          <p style="margin-top:1rem;"><strong>對初始資金${TOTAL_UPFRONT.toLocaleString()}克朗嘅現金回報率 = ${CASH_ON_CASH.toFixed(0)}%。</strong>非常吸引，完全合法，亦冇提升租金嘅審計風險。</p>`
        },
        { content: `
          <h2>07 &nbsp; 每月總收入（含增值稅）</h2>
          <div class="bar-chart" id="revenueChart"></div>
          <div style="display:flex; justify-content:center; gap:2rem; margin-top:1rem;">
            <div><span class="gold-accent">全年總計：</span> <span class="big-number" style="font-size:2.5rem;">${GROSS_REVENUE.toLocaleString()} kr</span></div>
          </div>`
        },
        { content: `
          <h2>08 &nbsp; 每月現金流（含香港利息）</h2>
          <div style="overflow-x:auto;">
            <table style="min-width:1000px; font-size:0.8rem;">
              <tr><th>月份</th><th>總收入</th><th>– 增值稅</th><th>– 佣金</th><th>– 其他營運</th><th>– 租金</th><th>AB營運現金</th><th>+ 租金收入</th><th>– 所有私人成本</th><th>私人淨額</th><th>合併</th></tr>
              ${buildMonthlyCashFlowTable()}
            </table>
          </div>
          <p style="margin-top:1rem;"><em>私人成本包括物業運作、物業稅、光纖、瑞典利息、香港利息同還本。大部分月份合併現金流為負數，但年度股息會解決私人嗰邊。</em></p>`
        },
        { content: `

      const presentation = document.getElementById('presentation');
      const dotNav = document.getElementById('dotNav');
      const slideIndicator = document.getElementById('slideIndicator');
      let currentSlide = 0;
      const totalSlides = slidesData.length;
      slideIndicator.textContent = `1 / ${totalSlides}`;

      slidesData.forEach((slide, index) => {
        const slideDiv = document.createElement('div');
        slideDiv.className = 'slide' + (index === 0 ? ' active' : '');
        if (slide.title) slideDiv.classList.add('title-slide');
        slideDiv.innerHTML = slide.content;
        slideDiv.setAttribute('data-index', index);
        presentation.appendChild(slideDiv);
        const dot = document.createElement('span');
        dot.className = 'dot' + (index === 0 ? ' active-dot' : '');
        dot.setAttribute('data-index', index);
        dot.addEventListener('click', () => goToSlide(index));
        dotNav.appendChild(dot);
      });

      function updateSlide() {
        document.querySelectorAll('.slide').forEach((s, idx) => s.classList.toggle('active', idx === currentSlide));
        document.querySelectorAll('.dot').forEach((d, idx) => d.classList.toggle('active-dot', idx === currentSlide));
        slideIndicator.textContent = `${currentSlide + 1} / ${totalSlides}`;
        const activeSlide = document.querySelector('.slide.active');
        if (activeSlide) activeSlide.scrollTop = 0;
        if (currentSlide === 7) setTimeout(drawRevenueChart, 60);
      }

      function drawRevenueChart() {
        const chart = document.getElementById('revenueChart');
        if (!chart) return;
        const max = Math.max(...monthlyRevenues);
        chart.innerHTML = '';
        monthlyRevenues.forEach((val, i) => {
          const bar = document.createElement('div');
          bar.className = 'bar';
          bar.style.height = (val / max * 100) + '%';
          bar.innerHTML = `<span class="bar-value">${(val/1000).toFixed(0)}k</span><span class="bar-label">${monthLabels[i]}</span>`;
          chart.appendChild(bar);
        });
      }

      window.goToSlide = function(index) {
        if (index < 0 || index >= totalSlides) return;
        currentSlide = index;
        updateSlide();
      };

      document.getElementById('prevSlide').addEventListener('click', () => goToSlide(currentSlide - 1));
      document.getElementById('nextSlide').addEventListener('click', () => goToSlide(currentSlide + 1));
      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); goToSlide(currentSlide + 1); }
        else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); goToSlide(currentSlide - 1); }
      });
      let touchStartX = 0;
      document.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX, {passive: true});
      document.addEventListener('touchend', e => {
        const diff = touchStartX - e.changedTouches[0].screenX;
        if (Math.abs(diff) > 50) goToSlide(currentSlide + (diff > 0 ? 1 : -1));
      });
      if (currentSlide === 7) setTimeout(drawRevenueChart, 100);
    })();
  </script>
