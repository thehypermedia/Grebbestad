    (function() {
      // --- HONEST CASH FLOW NUMBERS (corrected) ---
      const PURCHASE_PRICE = 8300000;
      const DOWN_PAYMENT = 830000;
      const LAGFART = 124500;
      const PANTBREV = 114550;
      const TOTAL_UPFRONT = DOWN_PAYMENT + LAGFART + PANTBREV;

      const LOAN = PURCHASE_PRICE * 0.9;
      const SWE_INTEREST = Math.round(LOAN * 0.0285);
      const AMORT = LOAN * 0.02;

      const GROSS_REVENUE = 2792325;
      const VAT = Math.round(GROSS_REVENUE - GROSS_REVENUE/1.12);
      const COMMISSION = Math.round(GROSS_REVENUE * 0.161);
      const CLEANING = 131250;
      const SUPPLIES = 30000;

      const DRIFT = 88226;
      const FASTIGHET = 10425;
      const FIBER = 6000;
      const HK_INTEREST_CASH = 350000;  // REAL cash outflow

      const RENT_A = 550000;
      // Total private cash outflows (all costs including HK interest)
      const PRIVATE_TOTAL_CASH_OUT = DRIFT + FASTIGHET + FIBER + SWE_INTEREST + HK_INTEREST_CASH + AMORT;
      // 88,226 + 10,425 + 6,000 + 212,895 + 350,000 + 149,400 = 816,946
      const PRIVATE_NET_BEFORE_REFUND = RENT_A - PRIVATE_TOTAL_CASH_OUT; // -266,946
      // Tax refund: capital deficit = (DRIFT+FASTIGHET+FIBER+SWE_INTEREST+HK_INTEREST_CASH) - RENT_A = 667,546 - 550,000 = 117,546
      const CAPITAL_DEFICIT = (DRIFT+FASTIGHET+FIBER+SWE_INTEREST+HK_INTEREST_CASH) - RENT_A;
      const TAX_REFUND = Math.round(0.3 * Math.min(CAPITAL_DEFICIT, 100000) + 0.21 * Math.max(0, CAPITAL_DEFICIT - 100000)); // 33,685
      const PRIVATE_NET_AFTER_REFUND = PRIVATE_NET_BEFORE_REFUND + TAX_REFUND; // -233,261

      // Company (Scenario A)
      const AB_PROFIT_BEFORE_TAX = GROSS_REVENUE - VAT - COMMISSION - CLEANING - SUPPLIES - RENT_A;
      const AB_TAX = Math.round(AB_PROFIT_BEFORE_TAX * 0.206);
      const AB_NET_PROFIT = AB_PROFIT_BEFORE_TAX - AB_TAX;

      // Dividend solution: cover the private cash shortfall
      const NEEDED_AFTER_TAX_DIVIDEND = Math.abs(PRIVATE_NET_AFTER_REFUND); // 233,261
      const DIVIDEND_BEFORE_TAX = Math.ceil(NEEDED_AFTER_TAX_DIVIDEND / 0.8); // 291,577
      const DIVIDEND_TAX = Math.round(DIVIDEND_BEFORE_TAX * 0.2);
      const DIVIDEND_NET = DIVIDEND_BEFORE_TAX - DIVIDEND_TAX;

      // After dividend, AB retained profit
      const AB_RETAINED_AFTER_DIVIDEND = AB_NET_PROFIT - DIVIDEND_BEFORE_TAX;

      // Combined surplus after all moves
      const TOTAL_PRIVATE_CASH_FINAL = RENT_A - PRIVATE_TOTAL_CASH_OUT + TAX_REFUND + DIVIDEND_NET; // should be ~0
      const COMBINED_CASH_GENERATED = AB_NET_PROFIT + RENT_A - (VAT+COMMISSION+CLEANING+SUPPLIES) + TAX_REFUND - PRIVATE_TOTAL_CASH_OUT + DIVIDEND_NET - DIVIDEND_TAX; 
      // Simpler: total cash created = AB net profit (pre-dividend) - dividend tax + private final (which is ~0) + tax refund (already included in private final).
      // AB net profit = 1,057,872; private final = 0 after dividend; but AB paid dividend out of its profit, so the cash originally in AB was 1,057,872; it paid 291,577 dividend, tax on dividend 58,315, net to private 233,261. Remaining in AB = 766,295. Private cash after all = 0. So total combined cash remaining = AB retained + private = 766,295. That's not the full original profit because of dividend tax leakage. So the structure costs 58k in dividend tax. But private cash deficit is solved.
      const COMBINED_RETAINED = AB_RETAINED_AFTER_DIVIDEND; // 766,295
      const CASH_ON_CASH = (COMBINED_RETAINED / TOTAL_UPFRONT) * 100; // still healthy

      // Monthly cash flow table (including HK interest as outflow)
      function buildMonthlyCashFlowTable() {
        const rentMonthly = RENT_A / 12;
        const otherOpExMonthly = (CLEANING + SUPPLIES) / 12;
        const privFixedMonthly = (DRIFT + FASTIGHET + FIBER) / 12;
        const sweInterestMonthly = SWE_INTEREST / 12;
        const hkInterestMonthly = HK_INTEREST_CASH / 12;
        const amortMonthly = AMORT / 12;
        const totalPrivOutMonthly = privFixedMonthly + sweInterestMonthly + hkInterestMonthly + amortMonthly;
        let rows = '';
        let totalGross=0, totalVat=0, totalComm=0, totalOther=0, totalRent=0, totalAbCash=0, totalPrivIn=0, totalPrivOut=0, totalPrivNet=0, totalCombined=0;

          const vat = Math.round(gross - gross/1.12);
          const comm = Math.round(gross * 0.161);
          const other = otherOpExMonthly;
          const rent = rentMonthly;
          const abCash = gross - vat - comm - other - rent;
          const privIn = rent;
          const privOut = totalPrivOutMonthly; // all private outflows
          const privNet = privIn - privOut;
          const combined = abCash + privNet;
          totalGross += gross; totalVat += vat; totalComm += comm; totalOther += other; totalRent += rent; totalAbCash += abCash; totalPrivIn += privIn; totalPrivOut += privOut; totalPrivNet += privNet; totalCombined += combined;
          const abClass = abCash >= 0 ? 'positive' : 'negative';
          const privClass = privNet >= 0 ? 'positive' : 'negative';
          const combClass = combined >= 0 ? 'positive' : 'negative';

            <td>${monthLabels[i]}</td><td>${gross.toLocaleString()}</td><td>${vat.toLocaleString()}</td><td>${comm.toLocaleString()}</td><td>${Math.round(other).toLocaleString()}</td><td>${Math.round(rent).toLocaleString()}</td>
            <td class="${abClass}">${Math.round(abCash).toLocaleString()}</td><td>${Math.round(privIn).toLocaleString()}</td><td>${Math.round(privOut).toLocaleString()}</td><td class="${privClass}">${Math.round(privNet).toLocaleString()}</td><td class="${combClass}">${Math.round(combined).toLocaleString()}</td>
          </tr>`;
        }

          <td>YEAR</td><td>${Math.round(totalGross).toLocaleString()}</td><td>${Math.round(totalVat).toLocaleString()}</td><td>${Math.round(totalComm).toLocaleString()}</td><td>${Math.round(totalOther).toLocaleString()}</td><td>${Math.round(totalRent).toLocaleString()}</td>
          <td>${Math.round(totalAbCash).toLocaleString()}</td><td>${Math.round(totalPrivIn).toLocaleString()}</td><td>${Math.round(totalPrivOut).toLocaleString()}</td><td>${Math.round(totalPrivNet).toLocaleString()}</td><td>${Math.round(totalCombined).toLocaleString()}</td>
        </tr>`;
        return rows;
      }

            <div style="margin-top:3rem; color:#8b96a8; font-size:1rem;">CONFIDENTIAL · INVESTOR MEMORANDUM · JUNE 2026</div>

        },
        { content: `
          <h2>01 &nbsp; Executive Summary</h2>
          <div class="grid-2col">
            <div>
              <p><span class="gold-accent">Nedre Långgatan 39</span> – purchase 8.3 MSEK. Previous models mistakenly treated the Hong Kong mortgage interest as a paper deduction only. <strong>It is a real cash outflow of ${HK_INTEREST_CASH.toLocaleString()} SEK per year.</strong></p>
              <p>With rent at 550 000 SEK, private cash flow is deeply negative. The solution is a tax‑efficient 3:12 dividend from the AB, which leaves the structure highly profitable overall.</p>

                <div><span class="big-number">766k</span><span class="stat-label">SEK Combined Retained</span></div>

      const presentation = document.getElementById('presentation');
      const dotNav = document.getElementById('dotNav');
      const slideIndicator = document.getElementById('slideIndicator');
      let currentSlide = 0;
      const totalSlides = slidesData.length;
      slideIndicator.textContent = `1 / ${totalSlides}`;

      slidesData.forEach((slide, index) => {
        const slideDiv = document.createElement('div');
        slideDiv.className = 'slide' + (index === 0 ? ' active' : '');
        if (slide.title) slideDiv.classList.add('title-slide');
        slideDiv.innerHTML = slide.content;
        slideDiv.setAttribute('data-index', index);
        presentation.appendChild(slideDiv);
        const dot = document.createElement('span');
        dot.className = 'dot' + (index === 0 ? ' active-dot' : '');
        dot.setAttribute('data-index', index);
        dot.addEventListener('click', () => goToSlide(index));
        dotNav.appendChild(dot);
      });

      function updateSlide() {
        document.querySelectorAll('.slide').forEach((s, idx) => s.classList.toggle('active', idx === currentSlide));
        document.querySelectorAll('.dot').forEach((d, idx) => d.classList.toggle('active-dot', idx === currentSlide));
        slideIndicator.textContent = `${currentSlide + 1} / ${totalSlides}`;
        const activeSlide = document.querySelector('.slide.active');
        if (activeSlide) activeSlide.scrollTop = 0;
        if (currentSlide === 7) setTimeout(drawRevenueChart, 60);
      }

      function drawRevenueChart() {
        const chart = document.getElementById('revenueChart');
        if (!chart) return;
        const max = Math.max(...monthlyRevenues);
        chart.innerHTML = '';
        monthlyRevenues.forEach((val, i) => {
          const bar = document.createElement('div');
          bar.className = 'bar';
          bar.style.height = (val / max * 100) + '%';
          bar.innerHTML = `<span class="bar-value">${(val/1000).toFixed(0)}k</span><span class="bar-label">${monthLabels[i]}</span>`;
          chart.appendChild(bar);
        });
      }

      window.goToSlide = function(index) {
        if (index < 0 || index >= totalSlides) return;
        currentSlide = index;
        updateSlide();
      };

      document.getElementById('prevSlide').addEventListener('click', () => goToSlide(currentSlide - 1));
      document.getElementById('nextSlide').addEventListener('click', () => goToSlide(currentSlide + 1));
      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); goToSlide(currentSlide + 1); }
        else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); goToSlide(currentSlide - 1); }
      });
      let touchStartX = 0;
      document.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX, {passive: true});
      document.addEventListener('touchend', e => {
        const diff = touchStartX - e.changedTouches[0].screenX;
        if (Math.abs(diff) > 50) goToSlide(currentSlide + (diff > 0 ? 1 : -1));
      });
      if (currentSlide === 7) setTimeout(drawRevenueChart, 100);
    })();
  </script>
